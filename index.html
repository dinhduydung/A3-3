<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống đếm ngược - Chế độ ON/OFF</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; margin: 5px; }
  .row { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
  .container-cells { display: flex; flex-wrap: wrap; justify-content: flex-start; }
  .button, .cell {
    display: flex; justify-content: center; align-items: center;
    border: 1px solid #ccc; margin: 2px;
    width: 60px; height: 60px;
    font-size: 12px; font-weight: bold; position: relative;
    border-radius: 8px; user-select: none;
  }
  .button { background-color: #4CAF50; color: white; cursor: pointer; }
  .select-multiple-button { background-color: lightgreen; color: #000; margin-left: 20px; min-width: 80px; font-size: 11px; }
  .select-multiple-button.active { background-color: lightpink; }
  .cell { background-color: #fff; color: #000; cursor: pointer; }
  .selected { background-color: #FF69B4 !important; }
  .expired { animation: blink 1s infinite; background-color: red !important; color: white; }
  @keyframes blink { 50% { opacity: 0.4; } }
  .stop { position: absolute; bottom: 2px; left: 3px; font-size: 10px; color: red; cursor: pointer; }
  .cell-content-wrapper { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
  .time { font-size: 14px; font-weight: bold; margin-top: 2px; }
</style>
</head>
<body>

<div class="row" id="row-minutes-top"></div>
<div class="container-cells" id="main-cells-container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBIqFzPL-tob4Lu1Xjg5tjCJeknYhiZmV0", 
    authDomain: "countdown1-45507.firebaseapp.com", 
    databaseURL: "https://countdown1-45507-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "countdown1-45507", 
    storageBucket: "countdown1-45507.firebasestorage.app", 
    messagingSenderId: "565185644071", 
    appId: "1:565185644071:web:dc90993788fc847248f002", 
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // Gửi chính xác chữ "ON" hoặc "OFF" vào nhánh 'thietbi'
  function notifyESP(label, action) {
    // action truyền vào là "ON" hoặc "OFF"
    set(ref(database, 'thietbi/' + label), action);
  }

  const minuteButtons = [0.2, 5, 10, 17, 20, 25, 32, 35, 40, 45, 50, 55, 62, 65, 70];
  const rowTop = document.getElementById('row-minutes-top');
  minuteButtons.forEach(min => {
    const btn = document.createElement('div');
    btn.className = 'button'; btn.textContent = min;
    btn.onclick = () => selectMinute(min);
    rowTop.appendChild(btn);
  });

  const selectMultipleBtn = document.createElement('div');
  selectMultipleBtn.className = 'button select-multiple-button';
  selectMultipleBtn.textContent = 'Chọn nhiều';
  selectMultipleBtn.onclick = () => toggleMultipleSelectionMode();
  rowTop.appendChild(selectMultipleBtn);

  let allCells = {};
  let selectedCell = null;
  let isMultipleSelectionMode = false;
  let selectedCellsForMultiple = new Set();
  let sentStatus = {};
  let serverTimeOffset = 0;

  onValue(ref(database, '.info/serverTimeOffset'), snap => serverTimeOffset = snap.val());

  function createCells(containerId, start, end) {
    const container = document.getElementById(containerId);
    for (let i = start; i <= end; i++) {
      const label = String(i);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerHTML = `<div class="stop" onclick="event.stopPropagation(); window.resetCell('${label}')">Tắt</div>
                        <div class="cell-content-wrapper"><div class="number">${label}</div><div class="time"></div></div>`;
      cell.onclick = () => selectCell(label);
      container.appendChild(cell);
      allCells[label] = { cell, timeEl: cell.querySelector('.time') };
    }
  }

  createCells('main-cells-container', 1, 160);

  onValue(ref(database, 'timers'), (snapshot) => {
    const data = snapshot.val() || {};
    const now = Date.now() + serverTimeOffset;

    Object.keys(allCells).forEach(label => {
      const timerData = data[label];
      const cellObj = allCells[label];

      if (timerData) {
        const elapsed = Math.floor((now - timerData.startTime) / 1000);
        const rem = Math.max(0, timerData.durationSeconds - elapsed);
        
        if (rem <= 0) {
          cellObj.cell.classList.add('expired');
          cellObj.timeEl.textContent = "HẾT";
          if (!sentStatus[label]) { 
            notifyESP(label, "ON"); 
            sentStatus[label] = true; 
          }
        } else {
          cellObj.cell.classList.remove('expired');
          const m = Math.floor(rem / 60); const s = String(rem % 60).padStart(2, '0');
          cellObj.timeEl.textContent = `${m}:${s}`;
          sentStatus[label] = false;
        }
      } else {
        cellObj.cell.classList.remove('expired');
        cellObj.timeEl.textContent = "";
        sentStatus[label] = false;
      }
    });
  });

  window.resetCell = (label) => {
    remove(ref(database, 'timers/' + label));
    notifyESP(label, "OFF");
  };

  function selectCell(label) {
    if (isMultipleSelectionMode) {
      if (selectedCellsForMultiple.has(label)) {
        selectedCellsForMultiple.delete(label); allCells[label].cell.classList.remove('selected');
      } else {
        selectedCellsForMultiple.add(label); allCells[label].cell.classList.add('selected');
      }
    } else {
      if (selectedCell) allCells[selectedCell].cell.classList.remove('selected');
      selectedCell = (selectedCell === label) ? null : label;
      if (selectedCell) allCells[selectedCell].cell.classList.add('selected');
    }
  }

  function selectMinute(min) {
    if (isMultipleSelectionMode) {
      selectedCellsForMultiple.forEach(label => {
        set(ref(database, 'timers/' + label), { durationSeconds: min * 60, startTime: serverTimestamp() });
        notifyESP(label, "OFF");
      });
      toggleMultipleSelectionMode();
    } else if (selectedCell) {
      set(ref(database, 'timers/' + selectedCell), { durationSeconds: min * 60, startTime: serverTimestamp() });
      notifyESP(selectedCell, "OFF");
      allCells[selectedCell].cell.classList.remove('selected');
      selectedCell = null;
    }
  }

  function toggleMultipleSelectionMode() {
    isMultipleSelectionMode = !isMultipleSelectionMode;
    selectedCellsForMultiple.clear();
    Object.values(allCells).forEach(c => c.cell.classList.remove('selected'));
    selectMultipleBtn.classList.toggle('active', isMultipleSelectionMode);
  }
</script>
</body>
</html>
