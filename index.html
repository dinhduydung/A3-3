<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ứng dụng đếm ngược Offline</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; margin: 5px; }
  .row { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
  .container-cells { display: flex; flex-wrap: wrap; justify-content: flex-start; }
  
  .button, .cell {
    display: flex; justify-content: center; align-items: center;
    border: 1px solid #ccc; margin: 2px;
    width: 60px; height: 60px;
    overflow: hidden;
    font-size: 12px; font-weight: bold; position: relative;
    border-radius: 8px; user-select: none;
  }
  .button { background-color: #4CAF50; color: white; }
  .select-multiple-button { background-color: lightgreen; color: #000; margin-left: 20px; min-width: 80px; font-size: 11px; }
  .select-multiple-button.active { background-color: lightpink; }
  .cell { background-color: #fff; color: #000; }
  .selected { background-color: #FF69B4 !important; color: #000; }
  .expired { animation: blink 1s infinite; background-color: red !important; color: white; }
  @keyframes blink { 50% { opacity: 0.4; } }
  .undo { position: absolute; top: 2px; left: 3px; font-size: 10px; color: blue; cursor: pointer; }
  .stop { position: absolute; bottom: 2px; left: 3px; font-size: 10px; color: red; cursor: pointer; }
  .exchange { position: absolute; bottom: 2px; right: 3px; font-size: 10px; color: green; cursor: pointer; }
  .cell-content-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; box-sizing: border-box; padding: 2px; }
  .number { font-size: 12px; line-height: 1.2; white-space: nowrap; color: #000; }
  .time { font-size: 14px; font-weight: bold; line-height: 1.2; white-space: nowrap; color: #000; margin-top: 2px; }
  .display-line-1 { font-size: 12px; line-height: 1.2; white-space: nowrap; }
  .display-line-2 { font-size: 14px; font-weight: bold; line-height: 1.2; white-space: nowrap; }
  .stats-table { margin-top: 20px; border-collapse: collapse; width: 100%; display: flex; flex-direction: column; }
  .stats-header, .stats-row { display: flex; border: 1px solid #ccc; font-size: 14px; font-weight: bold; }
  .stats-header-cell, .stats-cell { padding: 8px; border: 1px solid #ccc; flex: 1; text-align: center; }
  .stats-header-cell.col-car-number, .stats-cell.col-car-number { flex: 0.5; }
  .stats-header-cell.col-select-car, .stats-cell.col-select-car { flex: 1; }
  .stats-header-cell.col-start-time, .stats-cell.col-start-time, .stats-header-cell.col-end-time, .stats-cell.col-end-time { flex: 1.2; }
  .stats-header-cell.col-duration, .stats-cell.col-duration { flex: 0.8; }
  .stats-header-cell { background-color: #f2f2f2; font-weight: bold; }
  .stats-cell-flex-col { display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .select-car-button { background-color: #f2f2f2; cursor: pointer; }
  .select-car-button.active { background-color: lightpink; }
  .history-time { font-size: 10px; margin: 1px 0; }
</style>
</head>
<body>

<div class="row" id="row-minutes-top"></div>
<div class="container-cells" id="main-cells-container"></div>

<div class="stats-table">
  <div class="stats-header">
    <div class="stats-header-cell col-car-number">Xe số</div>
    <div class="stats-header-cell col-select-car select-car-button" id="select-car-button">Chọn xe</div>
    <div class="stats-header-cell col-start-time">Thời gian bắt đầu</div>
    <div class="stats-header-cell col-end-time">Thời gian kết thúc</div>
    <div class="stats-header-cell col-duration">Số phút</div>
  </div>
  <div class="stats-row" id="stats-row-container">
    <div class="stats-cell col-car-number" id="stats-car-number"></div>
    <div class="stats-cell col-select-car" id="stats-selected-car"></div>
    <div class="stats-cell stats-cell-flex-col col-start-time" id="stats-start-times"></div>
    <div class="stats-cell stats-cell-flex-col col-end-time" id="stats-end-times"></div>
    <div class="stats-cell stats-cell-flex-col col-duration" id="stats-duration"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, serverTimestamp, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBIqFzPL-tob4Lu1Xjg5tjCJeknYhiZmV0", 
    authDomain: "countdown1-45507.firebaseapp.com", 
    databaseURL: "https://countdown1-45507-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "countdown1-45507", 
    storageBucket: "countdown1-45507.firebasestorage.app", 
    messagingSenderId: "565185644071", 
    appId: "1:565185644071:web:dc90993788fc847248f002", 
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  // BIẾN QUAN TRỌNG: Lưu trạng thái lệnh cuối cùng để không gửi trùng lặp
  let lastSentState = {}; 

  function notifyESP(label, action) {
    if (lastSentState[label] === action) return; // Nếu lệnh giống hệt lần trước thì bỏ qua
    
    const commandsRef = ref(database, 'esp_commands');
    push(commandsRef, {
      id: String(label),
      lenh: action,
      time: serverTimestamp() 
    }).then(() => {
        lastSentState[label] = action;
        console.log(`Ô ${label}: Gửi lệnh ${action}`);
    });
  }

  const timersRef = ref(database, 'timers');
  const historyRef = ref(database, 'carHistory');
  const minuteButtons = [0.2, 5, 10, 17, 20, 25, 32, 35, 40, 45, 50, 55, 62, 65, 70];
  const rowTop = document.getElementById('row-minutes-top');
  
  minuteButtons.forEach(min => {
    const btn = document.createElement('div');
    btn.className = 'button'; btn.textContent = min;
    btn.onclick = () => selectMinute(min);
    rowTop.appendChild(btn);
  });

  const selectMultipleBtn = document.createElement('div');
  selectMultipleBtn.className = 'button select-multiple-button';
  selectMultipleBtn.textContent = 'Chọn nhiều';
  selectMultipleBtn.onclick = () => toggleMultipleSelectionMode();
  rowTop.appendChild(selectMultipleBtn);

  let allCells = {};
  let selectedCell = null;
  let exchangeFrom = null;
  let isMultipleSelectionMode = false;
  let selectedCellsForMultiple = new Set();
  let isSelectCarMode = false;
  let selectedCarLabel = null;
  let carHistory = {};
  let serverTimeOffset = 0;

  onValue(ref(database, '.info/serverTimeOffset'), snap => serverTimeOffset = snap.val());

  function createCells(containerId, start, end) {
    const container = document.getElementById(containerId);
    for (let i = start; i <= end; i++) {
      const label = String(i);
      const cell = document.createElement('div');
      cell.className = 'cell'; cell.id = `cell-${label}`;
      
      const undo = document.createElement('div'); undo.className = 'undo'; undo.textContent = '↩';
      const stop = document.createElement('div'); stop.className = 'stop'; stop.textContent = 'Tắt';
      const exch = document.createElement('div'); exch.className = 'exchange'; exch.textContent = 'Đổi';
      const number = document.createElement('div'); number.className = 'number'; number.textContent = label;
      const time = document.createElement('div'); time.className = 'time';
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'cell-content-wrapper';
      contentWrapper.append(number, time);
      
      undo.onclick = (e) => { e.stopPropagation(); undoCell(label); };
      stop.onclick = (e) => { e.stopPropagation(); resetCell(label); };
      exch.onclick = (e) => { e.stopPropagation(); startExchange(label); };
      cell.onclick = () => selectCell(label);
      
      cell.append(undo, stop, exch, contentWrapper);
      container.appendChild(cell);
      
      allCells[label] = { 
        cell, timer: null, remaining: 0, lastState: null, origin: null, 
        timeEl: time, numberEl: number, duration: 0, startTime: 0, 
        isExpired: false, originalMinutes: 0 
      };
    }
  }

  createCells('main-cells-container', 1, 160);

  function resetCell(label) {
    const cellData = allCells[label];
    if (cellData.startTime > 0) {
        cellData.lastState = { durationSeconds: cellData.duration, originalMinutes: cellData.originalMinutes, origin: cellData.origin, startTime: cellData.startTime };
        recordHistory(label, cellData.startTime, Date.now() + serverTimeOffset, cellData.originalMinutes);
    }
    notifyESP(label, "OFF"); // Tắt đèn ngay lập tức
    remove(ref(database, 'timers/' + label));
    if (selectedCell === label) clearSelected();
  }

  function startTimer(label, durationSeconds, originalMinutes, origin=null) {
    notifyESP(label, "OFF"); // Đảm bảo đèn tắt khi bắt đầu đếm
    set(ref(database, 'timers/' + label), { 
        durationSeconds: Math.floor(durationSeconds), 
        originalMinutes: originalMinutes, 
        origin: origin, 
        startTime: serverTimestamp() 
    });
  }

  // --- LOGIC ĐIỀU KHIỂN CHÍNH (SỬA LỖI TẠI ĐÂY) ---
  onValue(timersRef, (snapshot) => {
    const firebaseData = snapshot.val() || {};
    const now = Date.now() + serverTimeOffset;

    Object.keys(allCells).forEach(label => {
      const cellData = allCells[label];
      const data = firebaseData[label];

      if (data && data.startTime) {
        const elapsed = Math.floor((now - data.startTime) / 1000);
        const remaining = Math.max(0, data.durationSeconds - elapsed);

        cellData.duration = data.durationSeconds;
        cellData.startTime = data.startTime;
        cellData.originalMinutes = data.originalMinutes;
        cellData.origin = data.origin;
        cellData.remaining = remaining;

        if (remaining <= 0) {
          // HẾT GIỜ
          if (cellData.timer) { clearInterval(cellData.timer); cellData.timer = null; }
          cellData.cell.classList.add('expired');
          cellData.timeEl.textContent = 'HẾT';
          cellData.isExpired = true;
          notifyESP(label, "ON"); 
        } else {
          // ĐANG CHẠY
          cellData.cell.classList.remove('expired');
          cellData.isExpired = false;
          notifyESP(label, "OFF"); 
          updateDisplay(label, remaining);
          
          if (cellData.timer) clearInterval(cellData.timer);
          cellData.timer = setInterval(() => {
            const cNow = Date.now() + serverTimeOffset;
            const cElapsed = Math.floor((cNow - cellData.startTime) / 1000);
            const cRem = Math.max(0, cellData.duration - cElapsed);
            if (cRem <= 0) {
              clearInterval(cellData.timer); cellData.timer = null;
              cellData.cell.classList.add('expired'); cellData.timeEl.textContent = 'HẾT';
              notifyESP(label, "ON");
            } else {
              updateDisplay(label, cRem);
            }
          }, 1000);
        }
      } else {
        // Ô KHÔNG CÓ DỮ LIỆU (PHẢI TẮT ĐÈN)
        if (cellData.timer) { clearInterval(cellData.timer); cellData.timer = null; }
        cellData.cell.classList.remove('expired');
        cellData.cell.classList.remove('selected');
        cellData.timeEl.textContent = '';
        cellData.numberEl.textContent = label;
        cellData.remaining = 0;
        cellData.isExpired = false;
        notifyESP(label, "OFF");
      }
    });
  });

  // --- GIỮ NGUYÊN CÁC HÀM CÒN LẠI ---
  function selectCell(label) {
    if (isSelectCarMode) {
      selectedCarLabel = label;
      document.getElementById('stats-car-number').textContent = label;
      document.getElementById('stats-selected-car').textContent = `Xe ${label}`;
      updateStatsDisplay(label);
      isSelectCarMode = false;
      selectCarButton.classList.remove('active');
      return;
    }
    if (exchangeFrom) { transferTimer(exchangeFrom, label); return; }
    if (isMultipleSelectionMode) {
      if (selectedCellsForMultiple.has(label)) {
        selectedCellsForMultiple.delete(label);
        allCells[label].cell.classList.remove('selected');
      } else {
        selectedCellsForMultiple.add(label);
        allCells[label].cell.classList.add('selected');
      }
    } else {
      if (selectedCell === label) { clearSelected(); } 
      else { clearSelected(); selectedCell = label; allCells[label].cell.classList.add('selected'); }
    }
  }

  function selectMinute(min) {
    if (isMultipleSelectionMode) {
      selectedCellsForMultiple.forEach(label => {
        if (!allCells[label].isExpired && allCells[label].remaining <= 0) startTimer(label, min * 60, min);
      });
      toggleMultipleSelectionMode();
    } else {
      if (!selectedCell) return;
      if (allCells[selectedCell].remaining > 0 || allCells[selectedCell].isExpired) return;
      startTimer(selectedCell, min * 60, min);
      clearSelected();
    }
  }

  function updateDisplay(label, sec) {
    const cellData = allCells[label];
    const m = Math.floor(sec / 60); const s = String(sec % 60).padStart(2, '0');
    cellData.numberEl.textContent = cellData.origin ? `(${cellData.origin})-${label}` : label;
    cellData.timeEl.textContent = `${m}:${s}`;
  }

  function transferTimer(from, to) {
    const data = allCells[from];
    if (data.remaining > 0 || data.isExpired) {
       set(ref(database, 'timers/' + to), {
         durationSeconds: data.duration, originalMinutes: data.originalMinutes,
         origin: data.origin || from, startTime: data.startTime
       }).then(() => remove(ref(database, 'timers/' + from)));
    }
    exchangeFrom = null; clearSelected();
  }

  function undoCell(label) {
    const last = allCells[label].lastState;
    if (last && allCells[label].remaining <= 0 && !allCells[label].isExpired) {
      startTimer(label, last.durationSeconds, last.originalMinutes, last.origin);
      allCells[label].lastState = null;
    }
  }

  function startExchange(label) { clearSelected(); exchangeFrom = label; allCells[label].cell.classList.add('selected'); }
  function clearSelected() { Object.values(allCells).forEach(c => c.cell.classList.remove('selected')); selectedCell = null; exchangeFrom = null; selectedCellsForMultiple.clear(); }
  function toggleMultipleSelectionMode() { isMultipleSelectionMode = !isMultipleSelectionMode; clearSelected(); selectMultipleBtn.classList.toggle('active', isMultipleSelectionMode); }
  const selectCarButton = document.getElementById('select-car-button');
  selectCarButton.onclick = () => { isSelectCarMode = !isSelectCarMode; selectCarButton.classList.toggle('active', isSelectCarMode); };

  function recordHistory(label, startTime, endTime, durationMinutes) {
      if (!durationMinutes) return;
      const specificHistoryRef = ref(database, 'carHistory/' + label);
      onValue(specificHistoryRef, (snap) => {
          let list = snap.val() || [];
          if (!Array.isArray(list)) list = [];
          if (list.length > 0 && list[list.length-1].start === startTime) return;
          list.push({ start: startTime, end: endTime, duration: durationMinutes });
          if (list.length > 15) list.shift();
          set(specificHistoryRef, list);
      }, { onlyOnce: true });
  }

  onValue(historyRef, (snapshot) => { carHistory = snapshot.val() || {}; if (selectedCarLabel) updateStatsDisplay(selectedCarLabel); });

  function updateStatsDisplay(label) {
    const history = carHistory[label] || [];
    const startTimesEl = document.getElementById('stats-start-times');
    const endTimesEl = document.getElementById('stats-end-times');
    const durationEl = document.getElementById('stats-duration');
    startTimesEl.innerHTML = ''; endTimesEl.innerHTML = ''; durationEl.innerHTML = '';
    history.slice().reverse().forEach(item => {
      const s = new Date(item.start); const e = new Date(item.end);
      const format = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const sD = document.createElement('div'); sD.className = 'history-time'; sD.textContent = format(s);
      const eD = document.createElement('div'); eD.className = 'history-time'; eD.textContent = format(e);
      const dD = document.createElement('div'); dD.className = 'history-time'; dD.textContent = item.duration;
      startTimesEl.appendChild(sD); endTimesEl.appendChild(eD); durationEl.appendChild(dD);
    });
  }
</script>
</body>
</html>
